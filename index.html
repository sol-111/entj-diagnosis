<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ENTJ × INTJ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: #0f0f14;
    color: #e8e6f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gate {
    text-align: center;
    padding: 40px 24px;
    max-width: 360px;
    width: 100%;
  }
  .gate h1 {
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(135deg, #7c6ff7, #f76fa1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .gate .sub {
    font-size: 13px;
    color: #8a8a9a;
    margin-bottom: 32px;
  }
  .gate .lock {
    font-size: 48px;
    margin-bottom: 24px;
    filter: grayscale(0.3);
  }
  .input-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .gate input {
    width: 100%;
    padding: 14px 20px;
    font-size: 18px;
    letter-spacing: 8px;
    text-align: center;
    background: #1a1a24;
    border: 2px solid #2a2a3a;
    border-radius: 12px;
    color: #fff;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  .gate input:focus { border-color: #7c6ff7; }
  .gate input.error { border-color: #f87171; animation: shake 0.4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .gate button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #7c6ff7, #9b6ff7);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s, opacity 0.2s;
  }
  .gate button:active { transform: scale(0.97); }
  .gate .hint {
    font-size: 11px;
    color: #555;
    margin-top: 16px;
  }
  #content { display: none; }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="lock">&#128274;</div>
  <h1>ENTJ × INTJ</h1>
  <div class="sub">パスワードを入力してください</div>
  <div class="input-wrap">
    <input type="password" id="pw" inputmode="numeric" pattern="[0-9]*" maxlength="10" autofocus>
  </div>
  <button onclick="unlock()">開く</button>
  <div class="hint" id="hint"></div>
</div>

<div id="content"></div>

async function deriveKey(pw,salt){
  const enc=new TextEncoder();
  const keyData=enc.encode(pw);
  const h=new Uint8Array(32);
  // PBKDF2-like: match Python's hashlib.pbkdf2_hmac
  // We'll use SubtleCrypto PBKDF2
  const baseKey=await crypto.subtle.importKey("raw",keyData,"PBKDF2",false,["deriveBits"]);
  const bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},baseKey,256);
  return new Uint8Array(bits);
}

async function decrypt(pw){
  const raw=Uint8Array.from(atob(E),c=>c.charCodeAt(0));
  const salt=raw.slice(0,16);
  const ct=raw.slice(16);
  const key=await deriveKey(pw,salt);

  // XOR decrypt with SHA-256 CTR (matching Python)
  const dec=new Uint8Array(ct.length);
  let ks=new Uint8Array(0);
  let counter=0;
  while(ks.length<ct.length){
    const buf=new Uint8Array(key.length+4);
    buf.set(key);
    buf[key.length]=(counter>>>24)&0xff;
    buf[key.length+1]=(counter>>>16)&0xff;
    buf[key.length+2]=(counter>>>8)&0xff;
    buf[key.length+3]=counter&0xff;
    const h=await crypto.subtle.digest("SHA-256",buf);
    const tmp=new Uint8Array(ks.length+32);
    tmp.set(ks);
    tmp.set(new Uint8Array(h),ks.length);
    ks=tmp;
    counter++;
  }
  for(let i=0;i<ct.length;i++) dec[i]=ct[i]^ks[i];
  return new TextDecoder().decode(dec);
}

async function unlock(){
  const pw=document.getElementById("pw").value;
  if(!pw)return;
  const btn=document.querySelector(".gate button");
  btn.textContent="...";
  btn.style.opacity="0.6";
  try{
    const html=await decrypt(pw);
    if(!html.includes("<!DOCTYPE")){throw new Error("wrong");}
    document.getElementById("gate").style.display="none";
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    const inp=document.getElementById("pw");
    inp.classList.add("error");
    inp.value="";
    document.getElementById("hint").textContent="パスワードが違います";
    btn.textContent="開く";
    btn.style.opacity="1";
    setTimeout(()=>inp.classList.remove("error"),400);
  }
}

document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
